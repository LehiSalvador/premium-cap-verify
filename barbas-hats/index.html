<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Premium cap check page." />

  <title>BARBAS HATS | Premium Cap Verify</title>

  <link rel="stylesheet" href="/style.css" />
</head>

<body style="--brand-bg: url('/assets/backgrounds/barbas-hats-bg.jpg');">
  <main class="page">

    <section class="card">

      <p class="brand">PREMIUM CAP VERIFY</p>

      <div class="brand-image-box">
        <img src="/assets/brands/barbas-hats.svg" alt="BARBAS HATS" class="brand-image" />
      </div>

      <h1>BARBAS HATS</h1>

      <p class="sub-brand">BRAND CHECK</p>

      <div class="line"></div>

      <div class="scan-section">
        <p>TOTAL SCAN COUNT</p>
        <strong id="scanCount">2 SCANS</strong>
      </div>

      <div class="verify-pill">
        <span class="green-dot"></span>
        <span>VERIFY</span>
      </div>

      <div class="info">
        <div class="info-row">
          <span>Status</span>
          <strong>ACTIVE</strong>
        </div>
      </div>

      <p class="note">
        This item has been checked through Premium Cap Verify.
      </p>

    </section>

  </main>

  <script src="/script.js"></script>
</body>
</html>
