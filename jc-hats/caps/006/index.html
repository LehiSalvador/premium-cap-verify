<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Premium cap check page." />
  <title>GORRA JC HATS 006 | Premium Cap Verify</title>
  <link rel="stylesheet" href="/style.css?v=20260503201953" />
</head>

<body
  class="brand-background cap-detail-page"
  data-cap-id="006"
  data-brand-slug="jc-hats"
  data-brand-image="/assets/brands/jc-hats.svg"
  style="--brand-bg: url('/assets/backgrounds/jc-hats-bg.jpg');"
>
  <main class="page">
    <section class="card">

      <p class="top-label">AUTHENTIC PREMIUM CAP</p>

      <div class="cap-photo-frame">
        <img
          id="capMainImage"
          src="/assets/brands/jc-hats.svg"
          alt="GORRA JC HATS 006"
          class="cap-photo"
        />
      </div>

      <h1 class="main-title">AUTHENTIC</h1>

      <p class="cap-name">GORRA JC HATS 006</p>

      <div class="line"></div>

      <div class="scan-section">
        <p>TOTAL SCAN COUNT</p>
        <strong id="scanCount" data-scan-key="jc-hats-caps-006">LOADING</strong>
      </div>

      <div class="verify-pill">
        <span class="green-dot"></span>
        <span>VERIFY</span>
      </div>

      <div class="info">
        <div class="info-row">
          <span>Status</span>
          <strong>ACTIVE</strong>
        </div>
      </div>

      <p class="note">
        This item has been checked through Premium Cap Verify.
      </p>

    </section>
  </main>

  <script src="/script.js?v=scan-counter-v4"></script>

  <script>
    (function () {
      var capNameElement = document.querySelector(".cap-name");
      var imageElement = document.getElementById("capMainImage");
      var imageCandidates = ["./006.webp","./006.png","./006.jpg","./006.jpeg"];

      function bust(url) {
        if (!url) return url;
        return url + (url.indexOf("?") >= 0 ? "&" : "?") + "live=" + Date.now();
      }

      function updateNameFromFile() {
        if (!capNameElement) return;

        fetch("./name.txt?live=" + Date.now(), {
          method: "GET",
          cache: "no-store"
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("name_not_found");
            }

            return response.text();
          })
          .then(function (text) {
            var cleanText = String(text || "").trim();

            if (cleanText.length > 0) {
              capNameElement.textContent = cleanText.toUpperCase();
            }
          })
          .catch(function () {
            console.warn("No se pudo actualizar name.txt en vivo.");
          });
      }

      function updateImageFromFolder() {
        if (!imageElement || !imageCandidates || !imageCandidates.length) return;

        var index = 0;

        function tryNext() {
          if (index >= imageCandidates.length) {
            imageElement.onerror = null;
            return;
          }

          var nextImage = imageCandidates[index];
          index = index + 1;

          imageElement.onerror = tryNext;
          imageElement.src = bust(nextImage);
        }

        tryNext();
      }

      updateNameFromFile();
      updateImageFromFolder();
    })();
  </script>
</body>
</html>
