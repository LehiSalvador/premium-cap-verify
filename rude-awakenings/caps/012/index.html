<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Premium cap check page." />
  <title>GORRA RUDE AWAKENINGS 012 | Premium Cap Verify</title>
  <link rel="stylesheet" href="/style.css?v=20260503214607" />
</head>

<body
  class="brand-background cap-detail-page"
  data-cap-id="012"
  data-brand-slug="rude-awakenings"
  data-brand-image="/assets/brands/rude-awakenings.svg"
  style="--brand-bg: url('/assets/backgrounds/rude-awakenings-bg.jpg');"
>
  <main class="page">
    <section class="card">

      <p class="top-label">AUTHENTIC PREMIUM CAP</p>

      <div class="cap-photo-frame">
        <img
          id="capMainImage"
          src="/assets/brands/rude-awakenings.svg"
          alt="GORRA RUDE AWAKENINGS 012"
          class="cap-photo"
        />
      </div>

      <h1 class="main-title">AUTHENTIC</h1>

      <p class="cap-name">GORRA RUDE AWAKENINGS 012</p>

      <div class="line"></div>

      <div class="scan-section">
        <p>TOTAL SCAN COUNT</p>
        <strong id="scanCount" data-scan-key="rude-awakenings-caps-012">LOADING</strong>
      </div>

      <div class="verify-pill">
        <span class="green-dot"></span>
        <span>VERIFY</span>
      </div>

      <div class="info">
        <div class="info-row">
          <span>Status</span>
          <strong>ACTIVE</strong>
        </div>
      </div>

      <p class="note">
        This item has been checked through Premium Cap Verify.
      </p>

    </section>
  </main>

  <script src="/script.js?v=scan-counter-v4"></script>

  <script>
    (function () {
      var imageElement = document.getElementById("capMainImage");
      var candidates = ["./012-web.jpg","./012.png","./012.jpg","./012.jpeg","./012.webp"];
      var index = 0;

      function bust(url) {
        if (!url) return url;
        return url + (url.indexOf("?") >= 0 ? "&" : "?") + "live=" + Date.now();
      }

      function tryNextImage() {
        if (!imageElement || index >= candidates.length) {
          if (imageElement) imageElement.onerror = null;
          return;
        }

        var nextImage = candidates[index];
        index = index + 1;
        imageElement.onerror = tryNextImage;
        imageElement.src = bust(nextImage);
      }

      tryNextImage();
    })();
  </script>
</body>
</html>
