<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="robots" content="noindex, nofollow" />

  <title>Premium Cap Verify</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="card">

      <div class="brand">
        <p>PREMIUM CAP VERIFY</p>
      </div>

      <div class="seal-box">
        <img src="assets/verification-seal.png" alt="Verification Seal" class="seal-img" />
      </div>

      <h1>VERIFICATION ACTIVE</h1>

      <p class="subtitle">
        This cap has been registered and verified.
      </p>

      <div class="info-box">
        <div>
          <span>Verification ID</span>
          <strong id="capId">SEC-D02-001</strong>
        </div>

        <div>
          <span>Status</span>
          <strong>ACTIVE</strong>
        </div>

        <div>
          <span>Verification Method</span>
          <strong>NFC CHIP</strong>
        </div>

        <div>
          <span>Registered Piece</span>
          <strong>YES</strong>
        </div>
      </div>

      <p class="note">
        This verification confirms that this piece belongs to the registered inventory of Premium Cap Verify.
      </p>

    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (id) {
      document.getElementById("capId").textContent = id.toUpperCase();
    }
  </script>
</body>
</html>
