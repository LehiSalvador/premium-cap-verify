<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Premium NFC cap verification page." />

  <title>Premium Cap Verify</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">

    <section class="card">

      <p class="brand">PREMIUM CAP VERIFY</p>

      <div class="seal-container">
        <img src="assets/verification-seal.png" alt="Verification Seal" class="seal-image" />
      </div>

      <h1>AUTHENTIC</h1>

      <p class="model" id="capName">REGISTERED CAP</p>

      <div class="line"></div>

      <div class="scan-section">
        <p>TOTAL SCAN COUNT</p>
        <strong id="scanCount">2 SCANS</strong>
      </div>

      <div class="verify-pill">
        <span class="green-dot"></span>
        <span>VERIFY</span>
      </div>

      <div class="info">
        <div class="info-row">
          <span>Verification ID</span>
          <strong id="capId">SEC-D02-001</strong>
        </div>

        <div class="info-row">
          <span>Status</span>
          <strong>ACTIVE</strong>
        </div>

        <div class="info-row">
          <span>Method</span>
          <strong>NFC CHIP</strong>
        </div>
      </div>

      <p class="note">
        This item has been registered and verified through Premium Cap Verify.
      </p>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
